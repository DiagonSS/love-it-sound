<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЁМНЫЙ ПРИНЦ ЫА ЫА</title>
    <style>
        body {
            background: linear-gradient(45deg, #0a000a, #330033);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 3em;
            margin: 20px 0;
            text-shadow: 0 0 25px #ff00ff;
        }
        button {
            font-size: 2.3em;
            padding: 40px 80px;
            margin: 40px;
            background: #ff0088;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px #ff00ff;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            background: #ff44aa;
        }
        .subtitle {
            color: #ff99ff;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>🔥 ТЁМНЫЙ ПРИНЦ ЫА ЫА 🔥</h1>
    
    <button onclick="playSound()">▶️ ВКЛЮЧИТЬ ЗВУК</button>
    
    <p class="subtitle">I love it, love it, love it</p>

    <audio id="sound" src="https://raw.githubusercontent.com/DiagonSS/love-it-sound/main/myinstants.mp3"></audio>

    <script>
        function playSound() {
            const audio = document.getElementById('sound');
            audio.currentTime = 0;
            audio.play();
        }

        // Автозапуск (с запасом)
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('sound').play().catch(() => {});
            }, 1200);
        };
    </script>
</body>
</html>
