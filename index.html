<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЁМНЫЙ ПРИНЦ ЫА ЫА</title>
    <style>
        body {
            background: linear-gradient(45deg, #000, #220022);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            margin: 0;
        }
        h1 {
            font-size: 2.8em;
            margin: 30px 0;
            text-shadow: 0 0 20px #ff00ff;
        }
        button {
            font-size: 2.2em;
            padding: 35px 70px;
            margin: 40px;
            background: #ff00aa;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px #ff00ff;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff33bb;
            transform: scale(1.08);
        }
        .subtitle {
            color: #cc88ff;
            font-size: 1.3em;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>🔥 ТЁМНЫЙ ПРИНЦ ЫА ЫА 🔥</h1>
    
    <button onclick="playSound()">▶️ ВКЛЮЧИТЬ ЗВУК</button>
    
    <p class="subtitle">I love it, love it, love it</p>

    <!-- ПРАВИЛЬНАЯ ССЫЛКА НА ТВОЙ ФАЙЛ -->
    <audio id="sound" src="https://raw.githubusercontent.com/DiagonSS/love-it-sound/main/myinstants.mp3"></audio>

    <script>
        function playSound() {
            const audio = document.getElementById('sound');
            audio.currentTime = 0;
            audio.play().catch(err => alert("Не удалось воспроизвести. Проверь, что файл myinstants.mp3 загружен в репозиторий"));
        }

        // Попытка автозапуска
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('sound').play().catch(() => {});
            }, 1000);
        };
    </script>
</body>
</html>
